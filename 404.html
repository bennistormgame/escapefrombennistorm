<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lost in Bennistorm — 404 | Wibbles &amp; Wobbles</title>
<meta name="robots" content="noindex"/>
<link rel="icon" type="image/png" href="assets/logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@400;600&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0612;--cyan:#34d8de;--magenta:#ff4fa3;--purple:#a24fc0;--gold:#ffd24a;--ink:#f6eefc;--mut:#b9a6d6}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;
  font-family:'Fredoka',system-ui,sans-serif;color:var(--ink);
  background:radial-gradient(ellipse at 50% 30%,#1c1033,#0a0612 70%)}
.code{font-family:'Bungee';font-size:clamp(80px,22vw,200px);line-height:.9;
  background:linear-gradient(90deg,var(--cyan),var(--magenta),var(--purple));-webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 0 40px rgba(255,79,163,.3)}
h1{font-family:'Bungee';font-size:clamp(20px,4vw,30px);margin:6px 0 14px}
p{color:var(--mut);max-width:420px;font-size:16px;line-height:1.6;margin-bottom:26px}
.btn{font-family:'Bungee';font-size:14px;border-radius:12px;padding:14px 26px;color:#3a1d00;
  background:linear-gradient(180deg,#ffd874,#ff9e1f);box-shadow:0 6px 0 #b96d00,0 12px 22px rgba(255,158,31,.4);
  text-decoration:none;display:inline-block;transition:transform .15s}
.btn:hover{transform:translateY(-3px) scale(1.03)}
.eyebrow{font-family:'JetBrains Mono';letter-spacing:3px;font-size:12px;color:var(--cyan);text-transform:uppercase;margin-bottom:8px}
</style>
</head>
<body>
  <div class="eyebrow">// the doors are locked</div>
  <div class="code">404</div>
  <h1>You took a wrong turn in Bennistorm.</h1>
  <p>This page doesn't exist — or The Man got to it first. Let's get you back to safety.</p>
  <a class="btn" href="/">▸ ESCAPE TO THE HOME PAGE</a>
</body>
</html>
